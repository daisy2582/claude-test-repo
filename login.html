<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Vegora Bites</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/social.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(function(reg) { reg.update(); }).catch(function() {});
      navigator.serviceWorker.getRegistrations().then(function(registrations) { registrations.forEach(function(reg) { reg.unregister(); }); });
    }
    if ('caches' in window) { caches.keys().then(function(keys) { keys.forEach(function(key) { caches.delete(key); }); }); }
  </script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🌿</span>
        <span class="logo-text">Vegora Bites</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="community.html" class="nav-link">Community</a></li>
      </ul>
      <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <span class="auth-icon">🌱</span>
          <h1>Welcome Back</h1>
          <p>Log in to your Vegora Bites community account</p>
        </div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" required autocomplete="username" placeholder="Enter your username">
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Enter your password">
          </div>
          <div id="loginError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary auth-btn">Log In</button>
        </form>
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Create one</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Dark mode
    const dm = localStorage.getItem('darkMode');
    if (dm === 'true') document.body.classList.add('dark-mode');
    const toggle = document.getElementById('darkModeToggle');
    if (toggle) toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
      toggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });
    if (dm === 'true' && toggle) toggle.textContent = '☀️';
    document.body.classList.add('page-loaded');
  </script>
</body>
</html>
